name: count_to_three
description: "Count to Three — 鬧鐘 + 行事曆 + 待辦整合型時間管理工具"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.3

  # Local DB
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0

  # Recurrence rule expansion (RFC 5545 RRULE)
  rrule: ^0.2.7

  # Calendar grid widget
  table_calendar: ^3.1.0

  # NOTIFICATION-grade local notifications (Android only for now; iOS M8)
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

  # Immutable models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  google_sign_in: ^6.2.2
  connectivity_plus: ^6.1.1
  shared_preferences: ^2.3.0
  home_widget: ^0.7.0
  share_plus: ^10.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  riverpod_lint: ^2.3.13
  drift_dev: ^2.22.1
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  custom_lint: ^0.7.5

flutter:
  uses-material-design: true